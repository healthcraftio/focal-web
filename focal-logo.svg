<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Circular mask -->
    <clipPath id="circleClip">
      <circle cx="150" cy="150" r="110"/>
    </clipPath>
  </defs>


  <!-- Rays (clipped to circle) -->
  <g clip-path="url(#circleClip)">
    <!-- Off-center origin -->
    <g transform="translate(110,190)">
      
      <!-- Base ray (very long so clipping defines length) -->
      <line id="ray" x1="0" y1="0" x2="0" y2="-300"
            stroke="#666" stroke-width="3" stroke-linecap="round"/>

      <!-- Rotate copies (every 10° = 36 rays) -->
      <use href="#ray" transform="rotate(0)" />
      <use href="#ray" transform="rotate(10)" />
      <use href="#ray" transform="rotate(20)" />
      <use href="#ray" transform="rotate(30)" />
      <use href="#ray" transform="rotate(40)" />
      <use href="#ray" transform="rotate(50)" />
      <use href="#ray" transform="rotate(60)" />
      <use href="#ray" transform="rotate(70)" />
      <use href="#ray" transform="rotate(80)" />
      <use href="#ray" transform="rotate(90)" />
      <use href="#ray" transform="rotate(100)" />
      <use href="#ray" transform="rotate(110)" />
      <use href="#ray" transform="rotate(120)" />
      <use href="#ray" transform="rotate(130)" />
      <use href="#ray" transform="rotate(140)" />
      <use href="#ray" transform="rotate(150)" />
      <use href="#ray" transform="rotate(160)" />
      <use href="#ray" transform="rotate(170)" />
      <use href="#ray" transform="rotate(180)" />
      <use href="#ray" transform="rotate(190)" />
      <use href="#ray" transform="rotate(200)" />
      <use href="#ray" transform="rotate(210)" />
      <use href="#ray" transform="rotate(220)" />
      <use href="#ray" transform="rotate(230)" />
      <use href="#ray" transform="rotate(240)" />
      <use href="#ray" transform="rotate(250)" />
      <use href="#ray" transform="rotate(260)" />
      <use href="#ray" transform="rotate(270)" />
      <use href="#ray" transform="rotate(280)" />
      <use href="#ray" transform="rotate(290)" />
      <use href="#ray" transform="rotate(300)" />
      <use href="#ray" transform="rotate(310)" />
      <use href="#ray" transform="rotate(320)" />
      <use href="#ray" transform="rotate(330)" />
      <use href="#ray" transform="rotate(340)" />
      <use href="#ray" transform="rotate(350)" />
    </g>
  </g>

  <!-- Optional center dot -->
  <circle cx="110" cy="190" r="5" fill="#666"/>
</svg>